services:
  n8n:
    image: 'docker.n8n.io/n8nio/n8n'
    container_name: n8n-seederis
    restart: unless-stopped
    ports:
      - "5678:5678"  # Expose n8n directly to the internet
    environment:
      - GENERIC_TIMEZONE=Europe/Brussels
      - TZ=Europe/Brussels
      - N8N_SECURE_COOKIE=false  # Required to fix the login error over http
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - app-network

  neo4j:
    image: neo4j:5.26
    container_name: neo4j-mldsgraph
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc", "n10s"]
    volumes:
      - ./neo4j_data:/data
    networks:
      - app-network

  mcp-gateway:
    image: docker/mcp-gateway
    restart: unless-stopped
    command:
      - --servers=neo4j-cypher,neo4j-memory,context7,fetch
      - --transport=streaming
      - --port=3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - url=bolt://host.docker.internal:7687
      - username=neo4j
      - database=neo4j
      - password_file=/run/secrets/neo4j_password
    secrets:
      - neo4j_password
    ports:
      - "3000:3000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge


secrets:
  neo4j_password:
    file: ./neo4j_password.txt
