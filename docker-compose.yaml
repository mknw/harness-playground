services:
  n8n:
    image: 'docker.n8n.io/n8nio/n8n'
    container_name: n8n-seederis
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/Brussels
      - TZ=Europe/Brussels
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - app-network

  neo4j:
    image: neo4j:5.26
    container_name: neo4j-mldsgraph
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc", "n10s"]
    volumes:
      - ./neo4j_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-gateway:
    image: docker/mcp-gateway
    restart: unless-stopped
    command:
      # - --servers=neo4j-cypher,fetch,web_search
      - --config=/mcp/config.yaml
      - --catalog=/mcp/custom-catalog.yaml
      - --transport=streaming
      - --port=8811
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./mcp-config.yaml:/mcp/config.yaml:ro
      - ./custom-catalog.yaml:/mcp/custom-catalog.yaml:ro
    ports:
      - "8811:8811"
    networks:
      - app-network
    depends_on:
      neo4j:
        condition: service_healthy

networks:
  app-network:
    driver: bridge
