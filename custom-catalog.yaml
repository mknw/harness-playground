name: custom-catalog
displayName: Seederis KG Catalog
registry:
  neo4j-cypher:
    description: Interact with Neo4j using Cypher graph queries (fixed URI mapping)
    title: Neo4j Cypher
    type: server
    image: mcp/neo4j-cypher@sha256:e48235fb00b6b3c5c2e67d4c958786ad4ae8bc0c38cec090979cc3bc4e87f7cb
    tools:
      - name: get_neo4j_schema
      - name: read_neo4j_cypher
      - name: write_neo4j_cypher
    secrets:
      - name: neo4j-cypher.password
        env: NEO4J_PASSWORD
        example: password
    env:
      - name: NEO4J_URI                      # FIXED: Was NEO4J_URL
        value: '{{neo4j-cypher.uri}}'        # FIXED: Was {{neo4j-cypher.url}}
      - name: NEO4J_USERNAME
        value: '{{neo4j-cypher.username}}'
      - name: NEO4J_PASSWORD                   # ADD: Password as env variable
        value: '{{neo4j-cypher.password}}'     # ADD: Instead of as a secret
      - name: NEO4J_DATABASE
        value: '{{neo4j-cypher.database}}'
      - name: NEO4J_READ_ONLY
        value: '{{neo4j-cypher.read_only}}'
